<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="col-md-4">

         <div class="card shadow">

                <div class="card-body">
                    <form id="formulario">

                        <div class="mb-3">
                            <button
                                id="btnTransactions"
                                type="submit"
                                class="btn btn-primary w-100">
                                Transacciones
                            </button>
                        </div>

                        <div class="mb-3">
                            <button
                                id="btnDeposit"
                                type="submit"
                                class="btn btn-primary w-100">
                                Depositar
                            </button>
                        </div>
                        <div class="mb-3">
                            <button
                                id="btnSendMoney"
                                type="submit"
                                class="btn btn-primary w-100">
                                Enviar Dinero
                            </button>
                        </div>

                        <div class="mb-3">
                                <label class="form-label">Saldo Actual</label>
                                <label
                                    type="label"
                                    id="accountBalance"
                                    name="accountBalance"
                                    class="form-control">
                                </label>
                        </div>
                    </form>

                </div>
        </div>

    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../JS/menu.js"></script>

</body>
</html>
